<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1A0F26" />

    <!-- Security headers that browsers honour from a <meta> tag. GitHub Pages
         can't send real response headers; for the rest (HSTS, X-Frame-Options,
         X-Content-Type-Options) front the site with a CDN like Cloudflare and
         move this CSP there too. Notes:
           • script-src has NO 'unsafe-inline' — there are no inline scripts
             (the font media-swap was moved to main.tsx). gtag is the only
             external script and is consent-gated.
           • style-src needs 'unsafe-inline' for React/framer-motion inline
             styles; that's far lower risk than inline script.
           • connect-src wildcards Supabase (*.supabase.co) so it works across
             projects; tighten to your exact host if you prefer. Add new origins
             here if you introduce more third-party services. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        form-action 'self';
        script-src 'self' https://www.googletagmanager.com https://challenges.cloudflare.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' data: blob: https:;
        media-src 'self' blob:;
        worker-src 'self' blob:;
        manifest-src 'self';
        frame-src 'self' https://challenges.cloudflare.com;
        connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://*.ingest.sentry.io https://*.sentry.io https://challenges.cloudflare.com;
      "
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Primary (body) font: Inter. Preloaded so body text paints as early as
         possible. Only the weights actually used in the app are requested
         (300 / 800 were unused). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- Display, mono and fallback fonts: loaded without blocking first paint.
         media="print" keeps them out of the critical path; main.tsx flips them
         to media="all" once the app boots (an inline onload handler would need
         a CSP script-src exception, so the swap lives in JS instead). -->
    <link
      rel="stylesheet"
      media="print"
      data-defer-font
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700&display=swap"
      />
    </noscript>
    <title>Navya EdTech | High-Performance Websites & Digital Systems</title>
    <meta
      name="description"
      content="Navya EdTech builds high-performance websites and business management systems for modern businesses. Innovate. Build. Elevate."
    />
    <meta name="author" content="Navya EdTech" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Navya EdTech" />
    <meta property="og:title" content="Navya EdTech | High-Performance Websites & Digital Systems" />
    <meta property="og:description" content="High-performance websites & business systems, built to scale your business. Innovate. Build. Elevate." />
    <meta property="og:image" content="https://navyaedtech.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Navya EdTech — Innovate. Build. Elevate." />
    <meta property="og:url" content="https://navyaedtech.com/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://navyaedtech.com/og-image.png" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Navya EdTech — Blog"
      href="/rss.xml"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
