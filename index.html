<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A1628" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Primary (body) font: Inter. Preloaded so body text paints as early as
         possible. Only the weights actually used in the app are requested
         (300 / 800 were unused). -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />

    <!-- Display, mono and fallback fonts: loaded without blocking first paint
         (swapped from print to all once downloaded). -->
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700&display=swap"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700&display=swap"
      />
    </noscript>
    <title>Navya EdTech | High-Performance Websites & Digital Systems</title>
    <meta
      name="description"
      content="Navya EdTech builds high-performance websites and business management systems for modern businesses. Innovate. Build. Elevate."
    />
    <meta name="author" content="Navya EdTech" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Navya EdTech" />
    <meta property="og:title" content="Navya EdTech | High-Performance Websites & Digital Systems" />
    <meta property="og:description" content="High-performance websites & business systems, built to scale your business. Innovate. Build. Elevate." />
    <meta property="og:image" content="https://navyaedtech.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Navya EdTech — Innovate. Build. Elevate." />
    <meta property="og:url" content="https://navyaedtech.com/" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://navyaedtech.com/og-image.png" />
    <link
      rel="alternate"
      type="application/rss+xml"
      title="Navya EdTech — Blog"
      href="/rss.xml"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
